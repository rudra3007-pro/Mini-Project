<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MindEase — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center;
           justify-content:center; background:#0d1117; font-family:'DM Sans',sans-serif; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:1.5rem;
            padding:3rem; text-align:center; max-width:360px; width:90%; }
    .icon { font-size:3rem; }
    h1 { color:#e8edf5; margin:.5rem 0; }
    p  { color:#8b949e; margin-bottom:2rem; }
    .btn-google {
      display:inline-flex; align-items:center; gap:.75rem;
      background:#fff; color:#1a1a1a; font-weight:600; font-size:.95rem;
      padding:.75rem 1.5rem; border-radius:.75rem; text-decoration:none;
      transition:opacity .2s;
    }
    .btn-google:hover { opacity:.9; }
    .btn-google img { width:20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🧠</div>
    <h1>MindEase</h1>
    <p>Your personal mental wellness companion.<br/>Sign in to continue.</p>
    <a href="/auth/login" class="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
      Continue with Google
    </a>
  </div>
</body>
</html>
