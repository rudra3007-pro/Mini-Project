<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindEase — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terra-400: #c8703a;
      --terra-500: #a8521e;
      --terra-600: #8b3e12;
      --ink-900:   #1e1410;
      --ink-700:   #4a3020;
      --ink-500:   #7a5840;
      --ink-300:   #b09080;
      --bg-root:   #f5ede2;
      --bg-panel:  #fdf9f5;
      --bg-card:   #ffffff;
      --bg-glass:  rgba(253,249,245,0.85);
      --br-soft:   rgba(180,140,100,0.15);
      --br-mid:    rgba(160,120,80,0.28);
      --sh-md:     0 8px 32px rgba(120,70,20,0.12), 0 2px 8px rgba(120,70,20,0.07);
      --sh-glow:   0 0 0 3px rgba(168,82,30,0.15), 0 6px 28px rgba(168,82,30,0.18);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-root);
      font-family: 'Plus Jakarta Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Soft background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(200,112,58,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -80px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(139,62,18,0.10) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Dot texture overlay */
    .bg-texture {
      position: fixed; inset: 0; pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23a07850' fill-opacity='0.035'%3E%3Ccircle cx='20' cy='20' r='10'/%3E%3C/g%3E%3C/svg%3E");
    }

    /* Card */
    .card {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--br-soft);
      border-radius: 24px;
      padding: 44px 40px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--sh-md);
      position: relative;
      animation: cardIn 0.5s cubic-bezier(.34,1.26,.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--terra-400), var(--terra-600));
      border-radius: 0 0 4px 4px;
    }

    /* Logo icon */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 62px; height: 62px;
      background: linear-gradient(135deg, var(--terra-400), var(--terra-600));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(168,82,30,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: iconPop 0.6s 0.15s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 600;
      color: var(--ink-900);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 13.5px;
      color: var(--ink-500);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--br-soft);
    }
    .divider span {
      font-size: 11px; color: var(--ink-300);
      font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    }

    /* Google button */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--bg-card);
      border: 1.5px solid var(--br-mid);
      border-radius: 12px;
      color: var(--ink-700);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      padding: 13px 20px;
      text-decoration: none;
      width: 100%;
      box-shadow: 0 2px 8px rgba(120,70,20,0.07);
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s, border-color 0.18s;
      cursor: pointer;
    }
    .btn-google:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(120,70,20,0.13);
      border-color: var(--terra-400);
    }
    .btn-google:active { transform: scale(0.98); }
    .btn-google img { width: 20px; height: 20px; }

    /* Footer note */
    .footer-note {
      margin-top: 24px;
      font-size: 11.5px;
      color: var(--ink-300);
      line-height: 1.6;
    }
    .footer-note a {
      color: var(--terra-500);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-note a:hover { text-decoration: underline; }

    /* Privacy badge */
    .privacy {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(90,128,96,0.08);
      border: 1px solid rgba(90,128,96,0.18);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: #5a8060;
      font-weight: 500;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="bg-texture"></div>

  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.5 2a2.5 2.5 0 0 0-2.45 2A3 3 0 0 0 5 7a3.5 3.5 0 0 0-2 3.2A3.5 3.5 0 0 0 5 13.5a3 3 0 0 0 .5 4A2.5 2.5 0 0 0 8 20h4"/>
          <path d="M14.5 2a2.5 2.5 0 0 1 2.45 2A3 3 0 0 1 19 7a3.5 3.5 0 0 1 2 3.2 3.5 3.5 0 0 1-2 3.3 3 3 0 0 1-.5 4A2.5 2.5 0 0 1 16 20h-4"/>
          <line x1="12" y1="2" x2="12" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <path d="M9 8c0 1 .5 1.5 1.5 1.5S12 9 12 8" stroke="rgba(255,255,255,0.85)" stroke-width="1.2"/>
          <path d="M15 8c0 1-.5 1.5-1.5 1.5S12 9 12 8" stroke="rgba(255,255,255,0.85)" stroke-width="1.2"/>
          <path d="M9 13c0 1 .5 1.5 1.5 1.5S12 14 12 13" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
          <path d="M15 13c0 1-.5 1.5-1.5 1.5S12 14 12 13" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
        </svg>
      </div>
    </div>

    <h1>MindEase</h1>
    <p class="tagline">Your personal mental wellness companion.<br/>Sign in to continue your journey.</p>

    <div class="divider"><span>Sign in with</span></div>

    <a href="/auth/login" class="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
      Continue with Google
    </a>

    <div class="privacy">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Private &amp; Secure
    </div>

    <p class="footer-note">
      By continuing, you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </p>

  </div>
</body>
</html>
